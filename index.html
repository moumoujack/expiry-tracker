<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食品效期助手</title>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary:   #4CAF50; --primary-dk: #388E3C;
            --blue:      #2196F3;
            --bg:        #f4f7f6; --card:  #fff;
            --txt:       #333;    --sub:   #666;
            --border:    #e0e0e0;
            --warn-bg:   #fffde7; --warn-txt:  #f57f17;
            --exp-bg:    #ffebee; --exp-txt:   #c62828;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--txt); overflow-x: hidden; padding-bottom: 80px; }

        /* ── 顶栏 ── */
        .header { background: var(--card); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,.06); position: sticky; top: 0; z-index: 100; gap: 10px; }
        .menu-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px; flex-shrink: 0; }
        .store-switcher-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; background: #f0f7f0; border: 1px solid #c8e6c9; border-radius: 20px; padding: 6px 14px; cursor: pointer; max-width: 210px; overflow: hidden; }
        .store-name-row { display: flex; align-items: center; gap: 5px; font-size: 14px; font-weight: 600; color: var(--primary-dk); white-space: nowrap; overflow: hidden; }
        .store-name-text { overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
        .store-arrow { font-size: 10px; color: #888; }
        .store-version-hint { font-size: 10px; color: #aaa; white-space: nowrap; }
        .page-label { font-size: 12px; color: #aaa; flex-shrink: 0; min-width: 28px; text-align: right; }

        /* ── 今日预警 Banner ── */
        .warn-banner { display: none; margin: 10px 15px 0; border-radius: 10px; padding: 10px 14px; background: #fff3e0; border: 1px solid #ffe0b2; cursor: pointer; }
        .warn-banner.has-expired { background: #ffebee; border-color: #ffcdd2; }
        .warn-banner-inner { display: flex; align-items: center; justify-content: space-between; }
        .warn-banner-text { font-size: 14px; font-weight: 600; color: #e65100; }
        .warn-banner.has-expired .warn-banner-text { color: #c62828; }
        .warn-banner-sub { font-size: 12px; color: #888; margin-top: 2px; }
        .warn-banner-arrow { font-size: 12px; color: #bbb; }

        /* ── 侧边栏 ── */
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--card); z-index: 1001; transition: left .3s; box-shadow: 2px 0 10px rgba(0,0,0,.1); padding: 20px; overflow-y: auto; }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; display: none; }
        .sidebar > h3 { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .menu-item { margin-bottom: 22px; }
        .menu-item label.section-title { font-weight: bold; color: var(--primary); display: block; margin-bottom: 10px; font-size: 15px; }
        .menu-item label { font-size: 13px; color: var(--sub); display: block; margin-bottom: 5px; }

        /* 备份信息 */
        .backup-slots { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
        .backup-slot { background: #f5f5f5; border-radius: 6px; padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .backup-slot-info { color: #555; }
        .backup-slot-time { color: #aaa; font-size: 11px; }
        .backup-restore-btn { font-size: 12px; color: var(--blue); background: none; border: none; cursor: pointer; padding: 2px 6px; }

        /* 分类管理 */
        .cat-add-row { display: flex; gap: 6px; margin-bottom: 10px; }
        .cat-add-row input { flex: 1; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; background: #fafafa; }
        .cat-add-row button { padding: 8px 10px; background: var(--primary); color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .cat-list { display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto; }
        .cat-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 10px; background: #f5f5f5; border-radius: 6px; font-size: 14px; }
        .cat-item.builtin { color: #888; }
        .cat-delete-btn { background: none; border: none; color: #d32f2f; font-size: 16px; cursor: pointer; padding: 0 4px; }
        .cat-delete-btn:disabled { color: #ccc; cursor: default; }

        /* ── 主内容 ── */
        .view-section { display: none; padding: 12px 15px; max-width: 600px; margin: 0 auto; animation: fadeIn .3s; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
        .card { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 14px; border: 1px solid var(--border); }

        /* 自动补全 */
        .autocomplete-wrapper { position: relative; }
        .suggestions-list { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #fff; border: 1px solid var(--primary); border-radius: 8px; z-index: 2000; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 4px 15px rgba(0,0,0,.1); }
        .suggestion-item { padding: 11px 14px; border-bottom: 1px solid #f0f0f0; font-size: 15px; cursor: pointer; color: #222; }
        .suggestion-item:active { background: #f5f5f5; }

        /* 表单 */
        .search-container { position: relative; margin-bottom: 14px; }
        .search-container input { padding-left: 35px; border-radius: 20px; border-color: var(--primary); }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #888; font-size: 16px; }
        input, select { width: 100%; padding: 11px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; background: #fafafa; }
        input:focus, select:focus { border-color: var(--primary); background: #fff; }
        .form-group { margin-bottom: 14px; }
        .duration-input { display: flex; gap: 8px; }
        .duration-input > * { flex: 1; }

        /* 按钮 */
        .btn { padding: 11px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; display: inline-block; width: 100%; font-size: 15px; }
        .btn-primary  { background: var(--primary); color: #fff; }
        .btn-outline  { background: none; border: 1px solid #ccc; color: var(--txt); }
        .btn-blue     { background: var(--blue); color: #fff; }
        .btn-danger   { background: none; border: 1px solid #ffcdd2; color: #d32f2f; }

        /* 工具栏 */
        .list-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding: 0 4px; flex-wrap: wrap; gap: 8px; }
        .list-toolbar h3 { font-size: 15px; margin: 0; }
        .toolbar-actions { display: flex; gap: 6px; align-items: center; }
        .toolbar-actions select, .toolbar-actions button { padding: 6px 8px; font-size: 13px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
        #sortOrderBtn { width: 32px; padding: 6px 0; text-align: center; background: #f0f0f0; }

        .batch-panel { background: #e3f2fd; padding: 10px 14px; border-radius: 8px; display: none; justify-content: space-between; align-items: center; margin-bottom: 14px; }

        /* ── 商品卡片 ── */
        .item { padding: 14px; border-radius: 10px; margin-bottom: 12px; position: relative; border: 1px solid var(--border); background: #fff; display: flex; flex-direction: column; overflow: hidden; padding-left: 21px; }
        .item::before { content: ''; position: absolute; left: 0; top: 0; width: 6px; height: 100%; background: #ccc; transition: background .3s; }
        .item.ok::before, .item.warn::before { background: linear-gradient(to bottom, #4CAF50 calc(100% - var(--progress) - 20%), #FFB300 calc(100% - var(--progress) + 20%)); }
        .item.expired::before { background: #F44336; }
        .item.warn    { background: var(--warn-bg); }
        .item.expired { background: var(--exp-bg); }
        
        /* 待填写状态卡片颜色（灰色调） */
        .item.pending { background: #f9f9f9; border-color: #e0e0e0; }
        .item.pending::before { background: #cfcfcf; }
        
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .item-title-wrapper { display: flex; align-items: center; gap: 10px; }
        .item-checkbox { display: none; width: 20px; height: 20px; accent-color: var(--primary); }
        .item-title { font-weight: bold; font-size: 16px; color: #222; }
        .item-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 7px; }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 11px; background: #eee; color: #555; }
        .tag.qty-tag { background: #e3f2fd; color: #1565c0; }
        .item-details { font-size: 13px; color: #555; }
        .item-expiry { font-size: 14px; font-weight: bold; margin-top: 5px; display: flex; align-items: center; gap: 8px; }
        .item.warn .item-expiry    { color: var(--warn-txt); }
        .item.expired .item-expiry { color: var(--exp-txt); }
        .item.pending .item-expiry { color: #777; font-weight: normal; }
        
        .countdown-badge { font-size: 12px; padding: 2px 7px; border-radius: 10px; font-weight: bold; }
        .countdown-ok   { background: #e8f5e9; color: #2e7d32; }
        .countdown-warn { background: #fff3e0; color: #e65100; }
        .countdown-exp  { background: #ffebee; color: #c62828; }
        .item-btns { display: flex; gap: 8px; margin-top: 11px; }
        .btn-sm { padding: 6px; font-size: 13px; width: auto; flex: 1; }
        .status-badge { padding: 3px 7px; border-radius: 4px; font-size: 11px; font-weight: bold; flex-shrink: 0; }

        #chartContainer { width: 100%; height: 300px; background: #fff; border-radius: 12px; margin-bottom: 14px; border: 1px solid var(--border); display: none; padding: 10px 0; }

        /* 底部导航 */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; display: flex; box-shadow: 0 -2px 10px rgba(0,0,0,.05); z-index: 900; border-top: 1px solid #eaeaea; }
        .nav-item { flex: 1; text-align: center; padding: 11px 0; font-size: 12px; color: #888; cursor: pointer; transition: .2s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item .icon { font-size: 20px; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        #fileInput, #jsonImportInput { display: none; }

        /* ── 通用弹窗 ── */
        .modal-overlay-ui { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal-overlay-ui.active { display: flex; animation: mfade .2s; }
        @keyframes mfade { from { opacity: 0; } to { opacity: 1; } }
        .modal-card { background: #fff; width: 85%; max-width: 320px; border-radius: 16px; padding: 22px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,.2); transform: scale(.95); transition: .2s; }
        .modal-overlay-ui.active .modal-card { transform: scale(1); }
        .modal-card h3 { margin-bottom: 10px; font-size: 18px; }
        .modal-card p  { margin-bottom: 20px; color: #666; font-size: 14px; line-height: 1.5; }
        .modal-btns { display: flex; gap: 12px; }

        /* ── 导入确认弹窗 ── */
        .import-modal-card { background: #fff; width: 92%; max-width: 400px; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,.25); transform: scale(.95); transition: .2s; display: flex; flex-direction: column; max-height: 88vh; }
        .modal-overlay-ui.active .import-modal-card { transform: scale(1); }
        .import-modal-header { padding: 16px 18px 12px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .import-modal-header h3 { font-size: 16px; }
        .import-close-btn { background: none; border: none; font-size: 20px; color: #999; cursor: pointer; }
        .import-modal-body { flex: 1; overflow-y: auto; padding: 16px 18px; }
        .import-summary { background: #f8f8f8; border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; font-size: 14px; line-height: 1.8; }
        .import-summary .count-ok  { color: #2e7d32; font-weight: bold; }
        .import-summary .count-dup { color: #e65100; font-weight: bold; }
        .import-summary .count-bad { color: #999; }
        .import-mode-group { margin-bottom: 14px; }
        .import-mode-group label.mode-title { font-size: 13px; color: var(--sub); display: block; margin-bottom: 8px; }
        .import-radio-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border: 2px solid #eee; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: border-color .15s; }
        .import-radio-item.selected { border-color: var(--primary); background: #f0f9f0; }
        
        /* 修改的重点：防止全局 input 100% 宽度影响 radio 单选框 */
        .import-radio-item input[type=radio] { margin-top: 2px; accent-color: var(--primary); flex-shrink: 0; width: 18px; height: 18px; padding: 0; }
        
        .import-radio-label { flex: 1; }
        .import-radio-name { font-size: 14px; font-weight: 600; color: #222; }
        .import-radio-desc { font-size: 12px; color: #888; margin-top: 2px; }
        .import-radio-item.danger-mode { border-color: #ffcdd2; }
        .import-radio-item.danger-mode.selected { border-color: #d32f2f; background: #fff5f5; }
        .import-preview-title { font-size: 13px; color: var(--sub); margin-bottom: 8px; }
        .import-preview-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .import-preview-table th { background: #f5f5f5; padding: 6px 8px; text-align: left; color: #666; border-bottom: 1px solid #eee; }
        .import-preview-table td { padding: 6px 8px; border-bottom: 1px solid #f5f5f5; }
        .import-preview-table tr.dup-row td { color: #e65100; }
        .import-preview-table tr.bad-row td { color: #bbb; }
        .import-modal-footer { padding: 12px 18px; border-top: 1px solid #f0f0f0; display: flex; gap: 10px; flex-shrink: 0; }

        /* ── 门店选择器 ── */
        .store-picker-card { background: #fff; width: 92%; max-width: 380px; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,.25); transform: scale(.95); transition: .2s; max-height: 85vh; display: flex; flex-direction: column; }
        .modal-overlay-ui.active .store-picker-card { transform: scale(1); }
        .store-picker-header { padding: 16px 18px 12px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .store-picker-header h3 { font-size: 16px; }
        .store-picker-close { background: none; border: none; font-size: 20px; color: #999; cursor: pointer; padding: 4px; }
        .store-list-scroll { flex: 1; overflow-y: auto; }
        .store-item { display: flex; align-items: center; gap: 11px; padding: 13px 18px; border-bottom: 1px solid #f7f7f7; }
        .store-item.active-store { background: #f0f9f0; }
        .store-item-body { flex: 1; cursor: pointer; }
        .store-item-name { font-size: 15px; font-weight: 600; color: #222; }
        .store-item-meta { font-size: 12px; color: #aaa; margin-top: 2px; }
        .store-item-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .store-active-check { color: var(--primary); font-weight: bold; font-size: 18px; }
        .store-delete-btn { background: none; border: none; color: #ddd; font-size: 16px; cursor: pointer; padding: 4px; }
        .store-edit-btn   { background: none; border: none; color: #bbb; font-size: 14px; cursor: pointer; padding: 4px; line-height: 1; }
        .store-edit-btn:active { color: var(--primary); }
        .store-icon-big { font-size: 22px; flex-shrink: 0; }
        .store-add-area { padding: 13px 18px; border-top: 1px solid #eee; flex-shrink: 0; }
        .store-add-row { display: flex; gap: 8px; }
        .store-add-row input { flex: 1; padding: 9px 11px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; }
        .store-add-row input:focus { border-color: var(--primary); background: #fff; outline: none; }
        .store-add-btn { padding: 9px 13px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }

        /* Toast */
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.76); color: #fff; padding: 10px 22px; border-radius: 22px; font-size: 14px; z-index: 3000; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; max-width: 84vw; text-align: center; }
        .toast.show { opacity: 1; }

        /* ── 条形码扫描器弹窗 ── */
        .scanner-card { background: #0f0f1a; width: 94%; max-width: 380px; border-radius: 18px; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,.6); }
        .scanner-hd { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
        .scanner-hd span { color: #fff; font-size: 15px; font-weight: 600; }
        .scanner-hd button { background: none; border: none; color: #888; font-size: 22px; cursor: pointer; padding: 0 2px; line-height: 1; }
        .scanner-viewport { position: relative; width: 100%; background: #000; overflow: hidden; aspect-ratio: 1 / 1; }
        #scannerVideo { width: 100%; height: 100%; object-fit: cover; display: block; }
        .scanner-shade { position: absolute; inset: 0; display: grid; grid-template-rows: 1fr 36% 1fr; grid-template-columns: 1fr 72% 1fr; }
        .scanner-shade > div { background: rgba(0,0,0,.52); }
        .scanner-shade .hole { background: transparent; position: relative; }
        .scanner-hole-border { position: absolute; inset: 0; border: 2px solid rgba(255,255,255,.55); border-radius: 6px; }
        .scanner-hole-border::before, .scanner-hole-border::after { content: ''; position: absolute; width: 18px; height: 18px; border-color: #4CAF50; border-style: solid; border-radius: 3px; }
        .scanner-hole-border::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
        .scanner-hole-border::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }
        .scanner-laser { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent 5%, #4CAF50 40%, #80e080 50%, #4CAF50 60%, transparent 95%); animation: laserScan 1.8s ease-in-out infinite; box-shadow: 0 0 6px #4CAF50; }
        @keyframes laserScan { 0%,100% { top: 8%; opacity: .9; } 50% { top: 88%; opacity: 1; } }
        .scanner-tip { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,.7); font-size: 12px; white-space: nowrap; background: rgba(0,0,0,.4); padding: 3px 10px; border-radius: 10px; }
        .scanner-ft { padding: 12px 16px 14px; background: #16213e; min-height: 46px; display: flex; align-items: center; justify-content: center; }
        .scanner-ft-text { color: #8899bb; font-size: 13px; text-align: center; }
        .scanner-ft-text.scanning { color: #66aaff; }
        .scanner-ft-text.success  { color: #4CAF50; font-weight: 600; }
        .scanner-ft-text.error    { color: #ef5350; }

        /* API 设置区 */
        .api-platform-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
        .api-platform-row select { flex: 1; font-size: 13px; padding: 7px 8px; }
        .api-key-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
        .api-key-row input { font-size: 13px; padding: 7px 10px; }
        .api-status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #eee; color: #888; white-space: nowrap; }
        .api-status-badge.ok { background: #e8f5e9; color: #2e7d32; }
        .api-status-badge.warn { background: #fff3e0; color: #e65100; }
        .api-cors-tip { font-size: 11px; color: #aaa; line-height: 1.5; margin-top: 4px; }

        /* 产品条形码字段 */
        .barcode-display { font-size: 11px; color: #aaa; font-family: monospace; margin-top: 2px; }

        /* ── 内嵌扫码按钮（搜索框风格） ── */
        .scan-input-wrapper { position: relative; }
        .scan-input-wrapper input { padding-right: 50px; }
        .scan-trigger-btn {
            position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
            width: 36px; height: 36px;
            background: var(--primary); color: #fff;
            border: none; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background .15s, transform .1s;
        }
        .scan-trigger-btn:active { background: var(--primary-dk); transform: translateY(-50%) scale(.93); }

        /* 查询中 loading 动点 */
        .lookup-dots::after { content: ''; animation: dots 1.2s infinite; }
        @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <h3>工具菜单</h3>

    <div class="menu-item">
        <label class="section-title">⚙️ 系统设置</label>
        <div class="form-group"><label>临期预警天数 (天)</label><input type="number" id="warnDays" placeholder="例如: 7"></div>
        <div class="form-group"><label>默认生产日期</label><input type="date" id="defProdDate"></div>
        <div class="form-group"><label>默认保质期时长</label><input type="number" id="defLife" placeholder="例如: 180"></div>
        <div class="form-group">
            <label>默认单位</label>
            <select id="defUnit">
                <option value="days">天</option><option value="months">个月</option><option value="years">年</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">保存并应用设置</button>
    </div>

<script>
// ================================================================
// 全局版本号
// ================================================================
const APP_VERSION = 'V8.3';
// 启动时把版本号同步到页面标题，避免 title 和 APP_VERSION 分头维护时漏改
document.title = `食品效期助手 ${APP_VERSION}`;

// ================================================================
// 全局常量
// ================================================================
const STORE_KEYS = ['foodProducts','foodConfig','foodCategories','foodBackup_1','foodBackup_2','foodBackup_3'];

// ================================================================
// 工具函数
// ================================================================
function getLocalDateStr(date) {
    const d = date || new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDatetime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fileTs() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}-${String(d.getHours()).padStart(2,'0')}-${String(d.getMinutes()).padStart(2,'0')}-${String(d.getSeconds()).padStart(2,'0')}`;
}
function getExpiry(dateStr, life, unit) {
    if (!dateStr) return '';
    const parts = dateStr.split('-').map(Number);
    if (parts.length !== 3 || parts.some(isNaN)) return '';
    const d = new Date(parts[0], parts[1]-1, parts[2]);
    const n = parseInt(life);
    if (isNaN(n)) return '';
    if (unit === 'days') {
        d.setDate(d.getDate() + n);
    } else if (unit === 'months') {
        const origDay = d.getDate();
        d.setMonth(d.getMonth() + n);
        if (d.getDate() !== origDay) d.setDate(0);
    } else if (unit === 'years') {
        const origDay = d.getDate();
        d.setFullYear(d.getFullYear() + n);
        if (d.getDate() !== origDay) d.setDate(0);
    }
    return getLocalDateStr(d);
}
function getLifeInDays(life, unit) {
    const n = parseInt(life) || 0;
    if (unit === 'years')  return n * 365.25;
    if (unit === 'months') return n * 30.44;
    return n;
}
function parseDateMs(s) {
    if (!s) return 0;
    const pp = s.split('-').map(Number);
    return Date.UTC(pp[0], pp[1]-1, pp[2]);
}
function diffDays(aStr, bStr) {
    return Math.round((parseDateMs(bStr) - parseDateMs(aStr)) / 86400000);
}
function _debounce(fn, ms) {
    let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}
function escapeHtml(str) {
    return String(str == null ? '' : str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
let _lastId = 0;

// 【V8.3 新增】为多设备同步预留。浏览器端生成一次稳定的 deviceId(6 位 base36)并缓存到 localStorage。
// Capacitor APK 环境可在启动时覆盖本 key,用原生的设备 UID 替代。
function _getDeviceId() {
    try {
        let d = localStorage.getItem('foodDeviceId');
        if (!d) {
            d = Math.random().toString(36).slice(2, 8).padEnd(6, '0').slice(0, 6);
            localStorage.setItem('foodDeviceId', d);
        }
        return d;
    } catch(e) {
        return 'local0'; // 隐私模式等 localStorage 不可用时的兜底
    }
}

function genId() {
    let id = Date.now() * 1000 + Math.floor(Math.random() * 1000);
    if (id <= _lastId) id = _lastId + 1;
    _lastId = id;
    // 结构:[17 位数字时间戳] + [6 位 deviceId]  总长 23 字符
    // - 前 17 位保证字典序 = 时间顺序,兼容现有 localeCompare(numeric:true) 排序逻辑
    // - 后 6 位 deviceId 降低多设备同毫秒冲突概率(从 1/1000 降到 ~1/6.8 亿)
    // - 为未来的 Capacitor 多门店同步打基础:同一时刻 A/B 店同时生成 id 不会撞
    return String(id).padStart(17, '0') + _getDeviceId();
}

// ================================================================
// localStorage 安全写入
// ================================================================
function safeLSSet(key, value) {
    try {
        localStorage.setItem(key, value);
        return true;
    } catch(e) {
        if (e.name === 'QuotaExceededError' || e.code === 22 || e.code === 1014) {
            showToast('⚠️ 存储空间已满！请导出数据后清理旧记录', 5000);
        } else {
            showToast('⚠️ 数据保存失败，请重试', 3000);
            console.error('LS write error:', e);
        }
        return false;
    }
}

// ================================================================
// 门店管理
// ================================================================
let stores = [];
let activeStoreId = null;
// 非当前门店的统计数据缓存(count/pending/warn/expired)
// 单独放一个 Map,避免之前版本直接挂在 store 对象上导致 foodStores JSON 累积脏字段
const _storeStatsCache = new Map();

function sk(base) { return `${base}_${activeStoreId}`; }
function getActiveStore() { return stores.find(s => s.id === activeStoreId) || stores[0]; }

function initStores() {
    try { const s = localStorage.getItem('foodStores'); if (s) stores = JSON.parse(s); } catch(e) { stores = []; }
    if (!stores.length) {
        const id = 'store_' + genId();
        stores = [{ id, name: '默认门店', createdAt: Date.now(), lastModified: null }];
        safeLSSet('foodStores', JSON.stringify(stores));
        ['foodProducts','foodConfig','foodCategories'].forEach(key => {
            const old = localStorage.getItem(key);
            if (old) { safeLSSet(`${key}_${id}`, old); localStorage.removeItem(key); }
        });
    }
    // V8.2 迁移:清理 V8.1 及以前遗留在 store 对象上的 _cachedXxx 统计缓存字段
    let dirtyFound = false;
    stores = stores.map(s => {
        if (s._cachedCount != null || s._cachedPending != null ||
            s._cachedWarn != null  || s._cachedExpired != null) {
            dirtyFound = true;
            return { id: s.id, name: s.name, createdAt: s.createdAt, lastModified: s.lastModified };
        }
        return s;
    });
    if (dirtyFound) safeLSSet('foodStores', JSON.stringify(stores));

    const saved = localStorage.getItem('foodActiveStore');
    activeStoreId = (saved && stores.find(s => s.id === saved)) ? saved : stores[0].id;
    safeLSSet('foodActiveStore', activeStoreId);
}

function loadStoreData() {
    config = { warnDays: 7, defProdDate: '', defLife: '', defUnit: 'days' };
    try { const s = localStorage.getItem(sk('foodConfig')); if (s) config = { ...config, ...JSON.parse(s) }; } catch(e) {}
    customCategories = [];
    try { const s = localStorage.getItem(sk('foodCategories')); if (s) customCategories = JSON.parse(s); } catch(e) {}
    // 切换门店或重新加载数据后,分类列表可能完全不同,强制下次 renderCategorySelect 走慢路径重建
    if (typeof markCategoryDirty === 'function') markCategoryDirty();
    products = [];
    try { const s = localStorage.getItem(sk('foodProducts')); if (s) products = JSON.parse(s); } catch(e) {}
    // 【V8.3 迁移】统一 id 为字符串。老版本(V4.5 及以前)的 id 是 Number,
    // 比较时只能依赖 String(p.id) 兜底。加载时做一次性规范化,
    // 后续代码就可以安全地用严格相等 ===,无需每处都 String() 包装。
    let idDirty = false;
    products.forEach(p => {
        if (p.id != null && typeof p.id !== 'string') {
            p.id = String(p.id);
            idDirty = true;
        }
    });
    if (idDirty) safeLSSet(sk('foodProducts'), JSON.stringify(products));
}

function switchStore(storeId) {
    if (storeId === activeStoreId) { closeStorePicker(); return; }
    activeStoreId = storeId;
    safeLSSet('foodActiveStore', activeStoreId);
    loadStoreData();
    afterStoreSwitch();
    closeStorePicker();
    showToast(`✅ 已切换到：${getActiveStore().name}`);
}

// 重置页面瞬态 UI 状态(批量模式/分析图/排序方向/列表模式)。
// 在切换门店、恢复备份等场景复用,避免多份几乎相同的 DOM 重置代码。

    if (chartInstance) { chartInstance.dispose(); chartInstance = null; }

    _chartDataSig = null;
    _chartInitialized = false;
    isAnalysisOpen = false;
    isBatchMode = false;
    currentSortOrder = 'asc';
    document.getElementById('chartContainer').style.display = 'none';
    document.getElementById('btnAnalysis').style.backgroundColor = 'white';
    document.getElementById('batchPanel').style.display = 'none';
    document.getElementById('btnBatch').style.backgroundColor = 'white';

    document.getElementById('sortOrderBtn').textContent = '⬆️';

function updateStoreHeader() {

function updateStoreLastModified() {
    const idx = stores.findIndex(s => s.id === activeStoreId);
    if (idx !== -1) { stores[idx].lastModified = Date.now(); safeLSSet('foodStores', JSON.stringify(stores)); }
    updateStoreHeader();

function addStore() {
    const input = document.getElementById('newStoreInput');
    const name = input.value.trim();
    if (!name) return showToast('⚠️ 请输入门店名称');
    if (name.length > 20) return showToast('⚠️ 名称最多 20 字');
    if (stores.some(s => s.name === name)) return showToast('⚠️ 已存在同名门店');
    const ns = { id: 'store_' + genId(), name, createdAt: Date.now(), lastModified: null };
    stores.push(ns);
    safeLSSet('foodStores', JSON.stringify(stores));
    input.value = '';
    switchStore(ns.id);
    renderStoreList();
    showToast(`✅ 已新建门店：${name}`);
}

function renameStore(storeId) {
    const store = stores.find(s => s.id === storeId);
    if (!store) return;
    const body   = document.querySelector(`.store-item-body[data-store-id="${storeId}"]`);
    if (!body) return;
    const nameEl = body.querySelector('.store-item-name');
    if (!nameEl) return;
    const oldName = store.name;

    const input = document.createElement('input');
    input.value    = oldName;
    input.maxLength = 20;
    input.style.cssText = 'width:100%;padding:4px 8px;font-size:14px;font-weight:600;color:#222;border:1.5px solid var(--primary);border-radius:6px;outline:none;background:#fff;';
    nameEl.replaceWith(input);
    input.focus();
    input.select();

    const commit = () => {
        const newName = input.value.trim();
        const restored = document.createElement('div');
        restored.className = 'store-item-name';
        restored.textContent = newName || oldName;
        input.replaceWith(restored);

        if (!newName || newName === oldName) return;
        if (newName.length > 20) { showToast('⚠️ 名称最多 20 字'); renderStoreList(); return; }
        if (stores.some(s => s.id !== storeId && s.name === newName)) {
            showToast('⚠️ 已存在同名门店'); renderStoreList(); return;
        }
        store.name = newName;
        safeLSSet('foodStores', JSON.stringify(stores));
        if (storeId === activeStoreId) updateStoreHeader();
        renderStoreList();
        showToast(`✅ 已重命名为：${newName}`);
    };

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { input.blur(); }
        if (e.key === 'Escape') { input.value = oldName; input.blur(); }
    });
}

function deleteStore(storeId) {
    if (stores.length <= 1) return showToast('⚠️ 至少需要保留一个门店');
    const store = stores.find(s => s.id === storeId);
    if (!store) return;
    showConfirmModal('⚠️ 删除门店', `确定删除「${store.name}」及其所有数据？此操作不可恢复！`, () => {
        STORE_KEYS.forEach(key => {
            localStorage.removeItem(`${key}_${storeId}`);
        });
        stores = stores.filter(s => s.id !== storeId);
        safeLSSet('foodStores', JSON.stringify(stores));
        if (activeStoreId === storeId) {
            activeStoreId = stores[0].id;
            safeLSSet('foodActiveStore', activeStoreId);
            loadStoreData(); afterStoreSwitch();
        }
        renderStoreList();
        showToast('门店已删除');
    });
}

}
function closeStorePicker() {

/** 刷新非当前门店的缓存统计（将无日期的数据单独剥离统计） */
function refreshStoreCaches() {
    const todayStr = getLocalDateStr();
    stores.forEach(store => {
        if (store.id === activeStoreId) return; // 当前门店用内存数据
        const stats = { count: 0, pending: 0, warn: 0, expired: 0 };
        try {
            const d = localStorage.getItem(`foodProducts_${store.id}`);
            const cfg = localStorage.getItem(`foodConfig_${store.id}`);
            const warnDays = cfg ? (JSON.parse(cfg).warnDays || 7) : 7;
            const threshold = getExpiry(todayStr, warnDays, 'days');
            if (d) {
                const arr = JSON.parse(d);
                arr.forEach(p => {
                    if (!p.date) {
                        stats.pending++;
                    } else {
                        stats.count++;
                        if (p.expiry && p.expiry < todayStr) stats.expired++;
                        else if (p.expiry && p.expiry <= threshold) stats.warn++;
                    }
                });
            }
        } catch(e) { /* 保持 stats 为 0 */ }
        _storeStatsCache.set(store.id, stats);
    });
}

function renderStoreList() {
    const list = document.getElementById('storeList');
    list.innerHTML = '';
    stores.forEach(store => {
        const isActive = store.id === activeStoreId;
        let count = 0, warnCount = 0, expiredCount = 0, pendingCount = 0;
        
        if (isActive) {
            const todayStr = getLocalDateStr();
            const threshold = getExpiry(todayStr, config.warnDays, 'days');
            products.forEach(p => { 
                if (!p.date) {
                    pendingCount++;
                } else {
                    count++;
                    if (p.expiry && p.expiry < todayStr) expiredCount++; 
                    else if (p.expiry && p.expiry <= threshold) warnCount++; 
                }
            });
        } else {
            const stats = _storeStatsCache.get(store.id) || { count: 0, pending: 0, warn: 0, expired: 0 };
            count        = stats.count;
            pendingCount = stats.pending;
            warnCount    = stats.warn;
            expiredCount = stats.expired;
        }
        
        let metaHtml = `共 ${count} 件`;
        if (pendingCount > 0) metaHtml += ` · <span style="color:#555;font-weight:bold;">${pendingCount} 待填</span>`;
        if (expiredCount > 0) metaHtml += ` · <span style="color:#d32f2f;">${expiredCount} 已过期</span>`;
        else if (warnCount > 0) metaHtml += ` · <span style="color:#ef6c00;">${warnCount} 临期</span>`;
        
        const div = document.createElement('div');
        div.className = `store-item${isActive ? ' active-store' : ''}`;
        div.innerHTML = `
            <div class="store-icon-big">🏪</div>
            <div class="store-item-body" data-store-id="${escapeHtml(store.id)}">
                <div class="store-item-name">${escapeHtml(store.name)}</div>
                <div class="store-item-meta">${metaHtml}</div>
            </div>
            <div class="store-item-right">
                ${isActive ? '<span class="store-active-check">✓</span>' : ''}
                <button class="store-edit-btn" title="重命名" data-edit-store="${escapeHtml(store.id)}">✏️</button>
                ${stores.length > 1 ? `<button class="store-delete-btn" data-del-store="${escapeHtml(store.id)}">🗑</button>` : ''}
            </div>`;
        div.querySelector('.store-item-body').addEventListener('click', () => switchStore(store.id));
        const editBtn = div.querySelector('.store-edit-btn');
        if (editBtn) editBtn.addEventListener('click', (e) => { e.stopPropagation(); renameStore(store.id); });
        const delBtn = div.querySelector('.store-delete-btn');
        if (delBtn) delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteStore(store.id); });
        list.appendChild(div);
    });
}

let _lastBackupTs = 0;
// Quota 失败后的延长冷却时间(ms),避免短时间反复触发失败 toast
const _BACKUP_QUOTA_COOLDOWN = 5 * 60 * 1000;

function autoBackup() {
    const now = Date.now();
    if (now - _lastBackupTs < 60000) return; // 60 秒节流
    _lastBackupTs = now;
    const snap = JSON.stringify({ products, config, customCategories, ts: now, storeId: activeStoreId }, _stripTempFields);
    try {
        // 按 3→2→1 顺序依次轮转,任何一步失败立即终止,避免备份链错位污染已有快照
        // 失败后把 _lastBackupTs 推到未来一段时间,避免 5 分钟内的下次 autoBackup 再次命中同样的 Quota 失败
        const b2 = localStorage.getItem(sk('foodBackup_2'));
        if (b2 && !safeLSSet(sk('foodBackup_3'), b2)) { _lastBackupTs = now + _BACKUP_QUOTA_COOLDOWN; return; }
        const b1 = localStorage.getItem(sk('foodBackup_1'));
        if (b1 && !safeLSSet(sk('foodBackup_2'), b1)) { _lastBackupTs = now + _BACKUP_QUOTA_COOLDOWN; return; }
        if (!safeLSSet(sk('foodBackup_1'), snap))    { _lastBackupTs = now + _BACKUP_QUOTA_COOLDOWN; return; }
    } catch(e) { console.warn('autoBackup 异常:', e); }
    renderBackupSlots();
}

function renderBackupSlots() {
    const container = document.getElementById('backupSlots');
    if (!container) return;
    container.innerHTML = '';
    let found = false;
    [1,2,3].forEach(n => {
        try {
            const raw = localStorage.getItem(sk(`foodBackup_${n}`));
            if (!raw) return;
            const b = JSON.parse(raw);
            found = true;
            const cnt = (b.products || []).length;
            const div = document.createElement('div');
            div.className = 'backup-slot';
            div.innerHTML = `
                <div>
                    <div class="backup-slot-info">备份 ${n}：${cnt} 条记录</div>
                    <div class="backup-slot-time">${fmtDatetime(b.ts)}</div>
                </div>
                <button class="backup-restore-btn" data-restore="${n}">恢复</button>`;
            // 直接挂 click,避免动态 HTML 里的 onclick 字符串依赖全局函数名
            div.querySelector('.backup-restore-btn').addEventListener('click', () => restoreBackup(n));
            container.appendChild(div);
        } catch(e) {}
    });
    if (!found) {
        container.innerHTML = '<div style="font-size:13px;color:#bbb;padding:6px 0;">暂无备份记录</div>';
    }
}

function restoreBackup(slot) {
    const raw = localStorage.getItem(sk(`foodBackup_${slot}`));
    if (!raw) return showToast('⚠️ 备份不存在');
    let b;
    try { b = JSON.parse(raw); } catch(e) { return showToast('❌ 备份文件已损坏，无法恢复', 3000); }
    showConfirmModal(
        `恢复备份 ${slot}`,
        `将恢复至 ${fmtDatetime(b.ts)} 的状态（${(b.products||[]).length} 条记录）。当前数据将被覆盖，是否继续？`,
        () => {
            products = b.products || [];
            config = b.config || config;
            customCategories = b.customCategories || [];
            saveCategories(); safeLSSet(sk('foodConfig'), JSON.stringify(config));
            syncConfigToSettingsInputs();
            renderCategorySelect('其他'); renderCategoryManager();

            // 【Bug修复】恢复备份后必须退出批量模式、清空所有瞬态 UI 状态。
            // 若恢复前处于批量选择状态,syncData 会调用 renderRecentList,
            // 导致录入页的最近录入卡片也渲染出选择框。resetTransientUIState
            // 统一把 batch/analysis/sort 都清掉,再渲染就不会有残留。
            resetTransientUIState();

            syncData(false);
            showToast(`✅ 已恢复备份 ${slot}（${products.length} 条记录）`);
        }
    );
}

// ================================================================
function updateWarnBanner() {
    const todayStr = getLocalDateStr();
    const threshold = getExpiry(todayStr, config.warnDays, 'days');
    let expiredCnt = 0, warnCnt = 0, pendingCnt = 0;
    products.forEach(p => {
        if (!p.date) pendingCnt++;
        else if (p.expiry && p.expiry < todayStr) expiredCnt++;
        else if (p.expiry && p.expiry <= threshold) warnCnt++;
    });
    const banner = document.getElementById('warnBanner');
    const text   = document.getElementById('warnBannerText');
    const total  = expiredCnt + warnCnt + pendingCnt;
    if (!total) { banner.style.display = 'none'; return; }
    banner.style.display = 'block';
    banner.classList.toggle('has-expired', expiredCnt > 0);
    let msg = `⚠️ 今日需处理：${total} 件`;
    const parts = [];
    if (expiredCnt) parts.push(`${expiredCnt} 件已过期`);
    if (warnCnt)    parts.push(`${warnCnt} 件即将到期`);
    if (pendingCnt) parts.push(`${pendingCnt} 件待填写`);
    text.textContent = msg;
    document.querySelector('.warn-banner-sub').textContent = parts.join(' + ') + ' → 点击处理';
}

function handleBannerClick() {
    switchTab('list');
    // 清空搜索框,避免带着旧搜索词进入库存页后过滤干扰用户看不全待处理商品
    document.getElementById('searchInput').value = '';
    const todayStr = getLocalDateStr();
    const hasExpired = products.some(p => p.expiry && p.expiry < todayStr);
    if (hasExpired) {
        document.getElementById('sortMode').value = 'expiry';
    } else if (products.some(p => !p.date)) {
        document.getElementById('sortMode').value = 'pending';
    } else {
        document.getElementById('sortMode').value = 'expiry';
    }
    renderAllList();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ================================================================
// 分类管理
// ================================================================
const BUILTIN_CATEGORIES = [
    { label:'🥬 生鲜', value:'生鲜' }, { label:'🍬 零食', value:'零食' },
    { label:'🍹 饮品', value:'饮品' }, { label:'🧂 调料', value:'调料' },
    { label:'💊 药品', value:'药品' }, { label:'🧴 日用品', value:'日用' },
    { label:'📦 其他', value:'其他' },
];
let customCategories = [];
function getAllCategories() { return [...BUILTIN_CATEGORIES, ...customCategories]; }

// 【优化】只有分类增删时才重建 option 列表,否则仅更新 selected,
// 能显著降低 resetForm / saveProduct 等高频路径的重排成本
let _catSelectDirty = true;
function markCategoryDirty() { _catSelectDirty = true; }

function renderCategorySelect(sel) {
    const el = document.getElementById('prodCategory');
    const cur = sel !== undefined ? sel : el.value;

    // 快路径:option 列表没变,只需要切换 selected
    if (!_catSelectDirty && el.options.length > 0) {
        let matched = false;
        for (let i = 0; i < el.options.length; i++) {
            const opt = el.options[i];
            // 清掉旧的"未知分类"占位
            if (opt.textContent.includes('（未知分类）') && opt.value !== cur) {
                el.remove(i); i--; continue;
            }
            if (opt.value === cur) { opt.selected = true; matched = true; }
            else { opt.selected = false; }
        }
        if (!matched && cur) {
            // 补一个未知分类占位(同慢路径逻辑)
            const o = document.createElement('option');
            o.value = cur;
            o.textContent = `❓ ${cur}（未知分类）`;
            o.selected = true;
            el.appendChild(o);
        }
        return;
    }

    // 慢路径:全量重建
    el.innerHTML = '';
    getAllCategories().forEach(c => {
        const o = document.createElement('option');
        o.value = c.value; o.textContent = c.label;
        if (c.value === cur) o.selected = true;
        el.appendChild(o);
    });
    // 未知分类回退：如果 cur 不在任何已知分类里(例如导入的其他门店自定义分类),
    // 插入一个临时 option 并选中,防止编辑保存时分类被静默改成第一项(生鲜)
    if (cur && !getAllCategories().some(c => c.value === cur)) {
        const o = document.createElement('option');
        o.value = cur;
        o.textContent = `❓ ${cur}（未知分类）`;
        o.selected = true;
        el.appendChild(o);
    }
    _catSelectDirty = false;
}
function renderCategoryManager() {
    const list = document.getElementById('catList');
    list.innerHTML = '';
    BUILTIN_CATEGORIES.forEach(c => {
        const d = document.createElement('div');
        d.className = 'cat-item builtin';
        d.innerHTML = `<span>${c.label}</span><button class="cat-delete-btn" disabled>🔒</button>`;
        list.appendChild(d);
    });
    customCategories.forEach((c, idx) => {
        const d = document.createElement('div');
        d.className = 'cat-item';
        d.innerHTML = `<span>${escapeHtml(c.label)}</span><button class="cat-delete-btn">✕</button>`;
        d.querySelector('.cat-delete-btn').addEventListener('click', () => deleteCustomCategory(idx));
        list.appendChild(d);
    });
}
function addCustomCategory() {
    const input = document.getElementById('newCatInput');
    const raw = input.value.trim();
    if (!raw) return showToast('⚠️ 请输入分类名称');
    const value = raw.replace(/^[\p{Emoji}\s]+/u, '').trim() || raw;
    if (getAllCategories().some(c => c.value === value || c.label === raw)) return showToast('⚠️ 该分类已存在');
    if (value.length > 15) return showToast('⚠️ 分类名称最多 15 字');
    customCategories.push({ label: raw, value });
    // 保留当前录入表单下拉框选中的分类(用户正在该界面上操作,不应被打断)
    const curSel = document.getElementById('prodCategory').value || '其他';
    saveCategories(); renderCategorySelect(curSel); renderCategoryManager();
    input.value = '';
    showToast(`✅ 已添加：${raw}`);
}
function deleteCustomCategory(idx) {
    const c = customCategories[idx];
    if (!c) return;
    showConfirmModal('删除分类', `确定删除「${c.label}」？该分类产品将归入「其他」。`, () => {
        products.forEach(p => { if (p.category === c.value) p.category = '其他'; });
        customCategories.splice(idx, 1);
        saveCategories(); syncData();
        // 若当前下拉选中的恰好是被删除的分类,要回退到"其他";否则保留
        const curRaw = document.getElementById('prodCategory').value;
        const curSel = (curRaw === c.value) ? '其他' : (curRaw || '其他');
        renderCategorySelect(curSel); renderCategoryManager();
    });
}
function saveCategories() {
    safeLSSet(sk('foodCategories'), JSON.stringify(customCategories));
    markCategoryDirty();
}

// ================================================================
// 全局状态
// ================================================================
let products = [];
let config = { warnDays: 7, defProdDate: '', defLife: '', defUnit: 'days' };
let isBatchMode = false, isAnalysisOpen = false, chartInstance = null, currentSortOrder = 'asc';

// ================================================================
// 初始化
// ================================================================
document.addEventListener('DOMContentLoaded', function() {
    initStores(); loadStoreData(); updateStoreHeader();
    initApiSettingsUI();
    syncConfigToSettingsInputs();
    renderCategorySelect('其他'); renderCategoryManager(); renderBackupSlots();
    resetForm(); renderRecentList(); renderAllList(); updateWarnBanner();

    // 事件委托:两个商品列表容器共用一个处理函数,避免每张卡片挂 3 个 onclick
    document.getElementById('recentProductList').addEventListener('click', _onProductListClick);
    document.getElementById('allProductList').addEventListener('click', _onProductListClick);

    document.addEventListener('click', e => {
        document.querySelectorAll('.suggestions-list').forEach(l => {
            if (!l.contains(e.target) && e.target.tagName !== 'INPUT') l.style.display = 'none';
        });
    });
    setupAutocomplete('prodName', 'prodNameSuggest');
    setupAutocomplete('searchInput', 'searchSuggest');
    let _searchDebounce;
    document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(_searchDebounce);
        _searchDebounce = setTimeout(renderAllList, 150);
    });
    window.addEventListener('resize', () => { if (chartInstance) chartInstance.resize(); });
    // 在移动端/Capacitor APK 里 beforeunload 基本不触发,改用 visibilitychange + pagehide
    // 保证用户切后台或杀进程前能落盘最后一次备份
    // 【防御】若 10 秒内已经备份过,不再触发,避免挤掉刚刚落盘的新鲜快照
    const _flushBackup = () => {
        if (!products.length) return;
        if (Date.now() - _lastBackupTs < 10000) return;
        _lastBackupTs = 0;
        autoBackup();
    };
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') _flushBackup();
    });
    window.addEventListener('pagehide', _flushBackup);
    setInterval(() => { if (products.length) autoBackup(); }, 5 * 60 * 1000);
});

// ================================================================
// 导航
// ================================================================
function switchTab(tabId) {
    ['add','list'].forEach(t => {
        document.getElementById(`view-${t}`).classList.toggle('active', t === tabId);
        document.getElementById(`nav-${t}`).classList.toggle('active', t === tabId);
    });
    document.getElementById('headerTitle').textContent = tabId === 'add' ? '录入' : '库存';
    if (tabId === 'list' && isAnalysisOpen) updateChart();
}
function toggleMenu() {
    const sb = document.getElementById('sidebar'), ov = document.getElementById('overlay');
    sb.classList.toggle('active');
    ov.style.display = sb.classList.contains('active') ? 'block' : 'none';
}
function saveSettings() {
    config.warnDays   = Math.max(1, parseInt(document.getElementById('warnDays').value) || 7);
    config.defProdDate = document.getElementById('defProdDate').value;
    config.defLife    = document.getElementById('defLife').value;
    config.defUnit    = document.getElementById('defUnit').value;
    safeLSSet(sk('foodConfig'), JSON.stringify(config));
    showToast('✅ 设置已保存');
    resetForm(); renderRecentList(); renderAllList(); updateWarnBanner();
    toggleMenu();
}

// ================================================================
// 产品表单
// ================================================================
function handleFocus(el) { if (el.value === String(config.defLife) && config.defLife !== '') el.value = ''; }
function resetForm() {
    document.getElementById('editId').value = '';
    document.getElementById('prodName').value = '';
    document.getElementById('prodBarcode').value = '';
    renderCategorySelect('其他');
    document.getElementById('prodLocation').value = '常温';
    document.getElementById('prodDate').value = config.defProdDate || getLocalDateStr();
    document.getElementById('prodQty').value = '';
    document.getElementById('shelfLife').value = config.defLife;
    document.getElementById('timeUnit').value = config.defUnit;
    document.getElementById('formTitle').textContent = "✏️ 填写产品信息";
    document.getElementById('cancelBtn').style.display = 'none';
}
function saveProduct() {
    const name     = document.getElementById('prodName').value.trim();
    const category = document.getElementById('prodCategory').value;
    const location = document.getElementById('prodLocation').value;
    const date     = document.getElementById('prodDate').value;
    const lifeRaw  = document.getElementById('shelfLife').value;
    const unit     = document.getElementById('timeUnit').value;
    const editIdRaw= document.getElementById('editId').value;
    const barcode  = (document.getElementById('prodBarcode').value || '').trim();
    const qtyRaw   = document.getElementById('prodQty').value;
    const qty      = qtyRaw ? Math.max(1, parseInt(qtyRaw) || 1) : 1;
    const editId   = editIdRaw || null;   // 字符串或 null

    if (!name || !lifeRaw || !date) return showToast('⚠️ 请填写完整信息！');
    const life = parseInt(lifeRaw);
    if (isNaN(life) || life <= 0) return showToast('⚠️ 保质期时长须为正整数');

    const isDup = products.some(p => p.name === name && p.date === date && p.id !== editId);
    if (isDup) return showToast('⚠️ 库中已存在相同名称和生产日期的记录！');

    const expiry  = getExpiry(date, life, unit);
    const product = { id: editId || genId(), name, barcode, category, location, date, life, unit, expiry, qty };

    if (editId) {
        const idx = products.findIndex(p => p.id === editId);
        if (idx !== -1) products[idx] = product;
    } else {
        products.push(product);
    }
    syncData();
    resetForm();
    if (!editId) {
        const btn = document.getElementById('saveProdBtn');
        const old = btn.textContent;
        btn.textContent = "✅ 保存成功！"; btn.style.backgroundColor = "#2E7D32";
        setTimeout(() => { btn.textContent = old; btn.style.backgroundColor = "var(--primary)"; }, 1000);
        document.getElementById('prodName').focus();
    } else { switchTab('list'); }
}
function cancelEdit() { resetForm(); switchTab('list'); }

function _fillForm(p) {
    document.getElementById('prodName').value = p.name;
    document.getElementById('prodBarcode').value = p.barcode || '';
    renderCategorySelect(p.category || '其他');
    document.getElementById('prodLocation').value = p.location || '常温';
    document.getElementById('prodQty').value = p.qty || 1;
    document.getElementById('shelfLife').value = p.life;
    document.getElementById('timeUnit').value = p.unit;
}

function copyProduct(id) {
    const p = products.find(i => i.id === id);
    if (!p) return;
    document.getElementById('editId').value = '';
    _fillForm(p);
    document.getElementById('prodDate').value = getLocalDateStr();
    document.getElementById('formTitle').textContent = `📋 复制自「${p.name}」，请确认生产日期`;
    document.getElementById('cancelBtn').style.display = 'block';
    switchTab('add');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    showToast('已复制，请核对生产日期后保存');
}

function editProduct(id) {
    const p = products.find(i => i.id === id);
    if (!p) return;
    document.getElementById('editId').value = p.id;
    _fillForm(p);
    document.getElementById('prodDate').value = p.date;
    document.getElementById('formTitle').textContent = "🔧 正在编辑记录";
    document.getElementById('cancelBtn').style.display = 'block';
    switchTab('add');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deleteProduct(id) {
    showConfirmModal("删除产品", "确定要永久删除该记录吗？", () => {
        products = products.filter(p => p.id !== id);
        syncData();
    });
}

// ================================================================
// 自动补全
// ================================================================
function setupAutocomplete(inputId, suggestId, onSel) {
    const inp = document.getElementById(inputId), lst = document.getElementById(suggestId);
    const _render = () => {
        const v = inp.value.trim().toLowerCase();
        lst.innerHTML = '';
        if (!v) { lst.style.display = 'none'; return; }
        const m = [...new Set(products.map(p => p.name))].filter(n => n.toLowerCase().includes(v));
        if (!m.length) { lst.style.display = 'none'; return; }
        m.forEach(name => {
            const d = document.createElement('div');
            d.className = 'suggestion-item'; d.textContent = name;
            d.onclick = () => { inp.value = name; lst.style.display = 'none'; if (onSel) onSel(); };
            lst.appendChild(d);
        });
        lst.style.display = 'block';
    };
    inp.addEventListener('input', _debounce(_render, 150));
}

// 批量 & 分析

function toggleBatchMode() {
    isBatchMode = !isBatchMode;
    document.getElementById('batchPanel').style.display = isBatchMode ? 'flex' : 'none';
    document.getElementById('btnBatch').style.backgroundColor = isBatchMode ? '#e3f2fd' : 'white';
    document.getElementById('selectAllCB').checked = false;
    renderAllList();
}
function toggleSelectAll() {
    const c = document.getElementById('selectAllCB').checked;
    document.querySelectorAll('.item-checkbox').forEach(cb => cb.checked = c);
    updateBatchDeleteBtn();
}
function updateBatchDeleteBtn() {
    const cnt = document.querySelectorAll('.item-checkbox:checked').length;
    const btn = document.getElementById('batchDeleteBtn');
    btn.textContent = cnt > 0 ? `删除选中 ${cnt} 条` : '批量删除';
}
function batchDelete() {
    const checked = document.querySelectorAll('.item-checkbox:checked');
    if (!checked.length) return showToast('⚠️ 请先选择要删除的产品');
    const cnt = checked.length;
    showConfirmModal(
        '批量删除',
        `⚠️ 即将永久删除 ${cnt} 条记录，此操作不可撤销！`,
        () => {
            const ids = new Set(Array.from(checked).map(cb => cb.dataset.id));
            products = products.filter(p => !ids.has(p.id));
            document.getElementById('selectAllCB').checked = false;
            syncData();
            showToast(`已删除 ${cnt} 条记录`);
        },
        `确认删除 ${cnt} 条`
    );
}
function toggleAnalysis() {
    isAnalysisOpen = !isAnalysisOpen;
    document.getElementById('chartContainer').style.display = isAnalysisOpen ? 'block' : 'none';
    document.getElementById('btnAnalysis').style.backgroundColor = isAnalysisOpen ? '#e3f2fd' : 'white';
    if (isAnalysisOpen) updateChart();
}
// echarts 增量更新:
// - 数据指纹(产品数+到期月分桶签名)没变就直接 return,避免 setOption 重排
// - 数据变了只更新 series 和 xAxis.data,静态的 tooltip/grid/dataZoom 配置在首次 init 时一次性设置
let _chartDataSig = null;
let _chartInitialized = false;

function updateChart() {
    if (!chartInstance) {
        chartInstance = echarts.init(document.getElementById('chartContainer'));
        _chartInitialized = false;
        _chartDataSig = null;
    }
    if (!products.length) {
        if (_chartDataSig !== 'empty') {
            chartInstance.setOption({ title: { text:'暂无数据', left:'center', top:'center', textStyle:{color:'#999',fontSize:14} }, series:[] }, {notMerge:true});
            _chartDataSig = 'empty';
            _chartInitialized = false; // 下次有数据时重新走初始化路径
        }
        return;
    }

    // 统计到期月分布
    const mc = {}, curYM = getLocalDateStr().substring(0,7);
    products.forEach(p => { if (p.expiry) { const ym = p.expiry.substring(0,7); mc[ym] = (mc[ym]||0)+1; } });
    const yms = Object.keys(mc).sort();

    // 数据指纹:按键值对拼接。键值都变化时才有变化,能识别"某月过期商品数 +1/-1"的真实变化
    const sig = yms.map(ym => ym + ':' + mc[ym]).join('|');
    if (sig === _chartDataSig && _chartInitialized) return;
    _chartDataSig = sig;

    const xd = [], sd = [];
    yms.forEach(ym => {
        xd.push(ym);
        sd.push({ value: mc[ym], itemStyle: { color: ym < curYM ? '#c62828' : ym === curYM ? '#ef6c00' : '#4CAF50' } });
    });

    if (!_chartInitialized) {
        // 首次:设置完整配置
        chartInstance.setOption({
            title:{text:'按月过期时间分布',left:'center',textStyle:{fontSize:14}},
            tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},
            dataZoom:[{type:'inside'},{type:'slider',bottom:5,height:15}],
            grid:{left:'10%',right:'5%',bottom:'25%',top:'15%'},
            xAxis:{type:'category',data:xd,axisLabel:{rotate:45,interval:0}},
            yAxis:{type:'value',minInterval:1},
            series:[{name:'产品数量',data:sd,type:'bar',barMaxWidth:35,label:{show:true,position:'top'}}]
        }, {notMerge:true});
        _chartInitialized = true;
    } else {
        // 增量:只更新会变化的 xAxis.data 和 series.data,其他配置沿用
        chartInstance.setOption({
            xAxis:{data:xd},
            series:[{data:sd}]
        });
    }
}

// ================================================================
// 商品卡片（含待填写状态区分）
// ================================================================
function createProductCard(p, todayStr, warningThreshold, todayMs, catMap, showBatchControls = true) {
    let statusClass = 'ok';
    let badgeHtml = '<span class="status-badge" style="background:#e8f5e9;color:#2e7d32">安全</span>';
    const dateMs   = parseDateMs(p.date);
    const expiryMs = parseDateMs(p.expiry);
    const progress = expiryMs > dateMs ? Math.max(0, Math.min(100, ((todayMs - dateMs) / (expiryMs - dateMs)) * 100)) : 0;

    let countdownHtml = '';

    if (!p.date) {
        // 待填写状态：灰色调
        statusClass = 'pending';
        badgeHtml = '<span class="status-badge" style="background:#e0e0e0;color:#555">待填写</span>';
        countdownHtml = '<span class="countdown-badge" style="background:#eeeeee;color:#666">⬆ 点击编辑补填日期</span>';
    } else {
        const daysLeft = diffDays(todayStr, p.expiry);
        if (p.expiry < todayStr) {
            statusClass = 'expired';
            badgeHtml = '<span class="status-badge" style="background:#ffcdd2;color:#c62828">已过期</span>';
            countdownHtml = `<span class="countdown-badge countdown-exp">已过期 ${Math.abs(daysLeft)} 天</span>`;
        } else if (p.expiry <= warningThreshold) {
            statusClass = 'warn';
            badgeHtml = '<span class="status-badge" style="background:#ffe082;color:#ef6c00">即将过期</span>';
            countdownHtml = `<span class="countdown-badge countdown-warn">剩 ${daysLeft} 天</span>`;
        } else {
            countdownHtml = `<span class="countdown-badge countdown-ok">剩 ${daysLeft} 天</span>`;
        }
    }

    const unitMap = { days:'天', months:'个月', years:'年' };
    const catLabel = (catMap && catMap.get(p.category)) || escapeHtml(p.category || '其他');
    const qty = p.qty || 1;
    // 仅在允许批量控件的容器(库存列表)且当前处于批量模式时才显示 checkbox
    const enableBatch = isBatchMode && showBatchControls;
    const safeId = escapeHtml(String(p.id));
    const div = document.createElement('div');
    div.className = `item ${statusClass}`;
    div.style.setProperty('--progress', `${progress}%`);
    div.innerHTML = `
        <div class="item-header">
            <div class="item-title-wrapper">
                <input type="checkbox" class="item-checkbox" data-id="${safeId}" style="display:${enableBatch?'inline-block':'none'}" onchange="updateBatchDeleteBtn()">
                <div class="item-title">${escapeHtml(p.name)}</div>
            </div>
            ${badgeHtml}
        </div>
        <div class="item-tags">
            <span class="tag">🔖 ${escapeHtml(catLabel)}</span>
            <span class="tag">📍 ${escapeHtml(p.location||'常温')}</span>
            ${qty > 1 ? `<span class="tag qty-tag">📦 × ${qty}</span>` : ''}
        </div>
        <div class="item-details">生产: ${p.date ? escapeHtml(p.date) : '<em style="color:#999">待填写</em>'} | 保质期: ${escapeHtml(String(p.life))}${escapeHtml(unitMap[p.unit]||'')}</div>
        ${p.barcode ? `<div class="barcode-display">🔢 ${escapeHtml(p.barcode)}</div>` : ''}
        <div class="item-expiry">${p.expiry ? '过期: ' + escapeHtml(p.expiry) : '<em style="color:#999">过期日待计算</em>'} ${countdownHtml}</div>
        <div class="item-btns" style="display:${enableBatch?'none':'flex'}">
            <button class="btn btn-outline btn-sm" data-action="copy" data-id="${safeId}">📋 复制</button>
            <button class="btn btn-outline btn-sm" data-action="edit" data-id="${safeId}">📝 编辑</button>
            <button class="btn btn-danger btn-sm" data-action="delete" data-id="${safeId}">🗑️ 删除</button>
        </div>`;
    return div;
}

// 商品卡片按钮事件委托:复制/编辑/删除统一走 data-action,避免每张卡片挂 3 个 onclick
// 挂在两个列表容器上,而不是 document,可以减少无关冒泡触发
function _onProductListClick(e) {
    const btn = e.target.closest('button[data-action][data-id]');
    if (!btn) return;
    const id = btn.dataset.id;
    switch (btn.dataset.action) {
        case 'copy':   copyProduct(id); break;
        case 'edit':   editProduct(id); break;
        case 'delete': deleteProduct(id); break;
    }
}

function renderRecentList() {
    const list = document.getElementById('recentProductList');
    list.innerHTML = '';
    if (!products.length) { list.innerHTML = `<div style="text-align:center;color:#999;padding:20px;">还没有录入任何产品</div>`; return; }
    const ts = getLocalDateStr(), wt = getExpiry(ts, config.warnDays, 'days'), tMs = parseDateMs(ts);
    const catMap = new Map(getAllCategories().map(c => [c.value, c.label]));
    const sorted = [...products].sort((a,b) =>
        String(b.id||'').localeCompare(String(a.id||''), undefined, {numeric: true})
    );
    const SHOW_MAX = 10;
    // 【优化】用 DocumentFragment 一次性挂载,避免 N 次 appendChild 触发的重排
    const frag = document.createDocumentFragment();
    // 最近录入卡片永远展示操作按钮,不受库存页批量模式影响(传 showBatchControls=false)
    sorted.slice(0, SHOW_MAX).forEach(p => frag.appendChild(createProductCard(p, ts, wt, tMs, catMap, false)));
    if (sorted.length > SHOW_MAX) {
        const link = document.createElement('div');
        link.style.cssText = 'text-align:center;padding:14px;color:var(--primary);font-size:14px;cursor:pointer;font-weight:600;';
        link.textContent = `查看全部 ${sorted.length} 件商品 →`;
        link.onclick = () => { document.getElementById('sortMode').value='recent'; switchTab('list'); };
        frag.appendChild(link);
    }
    list.appendChild(frag);
}

// ================================================================
// 库存列表（隔离显示、动态计数）
// ================================================================
const PAGE_SIZE = 30;
let _filteredCache = [];
let _renderedCount = 0;
// 预构建的分类 label 映射表,renderAllList 里重置一次,renderNextPage 复用不重复构建
let _catMapCache = null;

// 【搜索性能优化】为每个 product 懒缓存归一化后的搜索文本。
// - 首次搜索时计算并挂在对象的 _search 属性上(不入库,syncData 时会被 JSON 序列化成冗余字段,
//   但 JSON.stringify 对前缀下划线字段照常写入,所以我们在保存前剥离一次)。
// - 商品改名/改分类/改位置后 _search 会失效,saveProduct / Excel 导入 / JSON 导入时重新分配的
//   对象本身就是新对象,没有 _search,下次搜索时自然会重算,无需显式清理。
function getSearchText(p) {
    if (p._search === undefined) {
        p._search = (
            (p.name || '') + '\u0001' +
            (p.category || '') + '\u0001' +
            (p.location || '')
        ).toLowerCase();
    }
    return p._search;
}

function renderAllList() {
    const list = document.getElementById('allProductList');
    const mode = document.getElementById('sortMode').value;
    const kw   = document.getElementById('searchInput').value.trim().toLowerCase();
    list.innerHTML = '';
    _renderedCount = 0;
    _catMapCache = new Map(getAllCategories().map(c => [c.value, c.label]));

    // 1. 过滤逻辑：不同模式下严格分离待填写数据
    //    使用 getSearchText(p) 缓存 name+category+location 的 lowercase 拼接,
    //    相比每次 3 次 toLowerCase() + 3 次 includes(),热路径下显著降低 CPU 占用
    _filteredCache = products.filter(p => {
        const matchKw = !kw || getSearchText(p).includes(kw);

        if (mode === 'pending') {
            return matchKw && !p.date; // 待填模式：只看没日期的
        } else if (kw) {
            return matchKw;            // 搜索模式：只要符合关键词全展示
        } else {
            return matchKw && !!p.date; // 正常模式：彻底隐藏没日期的
        }
    });

    // 2. 标题数量动态更新
    const validTotal = products.filter(p => p.date).length;
    if (mode === 'pending') {
        document.getElementById('listCount').textContent = `待填日期 (${_filteredCache.length})`;
    } else if (kw) {
        document.getElementById('listCount').textContent = `搜索结果 (${_filteredCache.length})`;
    } else {
        document.getElementById('listCount').textContent = `有效商品 (${validTotal})`;
    }

    if (!_filteredCache.length) { 
        list.innerHTML = `<div style="text-align:center;color:#999;padding:40px;">${mode === 'pending' ? '🎉 太棒了，所有信息已补全！' : '没搜到相关产品'}</div>`; 
        return; 
    }

    // 3. 排序逻辑
    if (mode === 'life') {
        // 【优化】预先算好天数,避免 O(N log N) 次重复 getLifeInDays 调用
        // 先 map 一次成 [{p, days}] 再排,排完再 map 回来
        const withDays = _filteredCache.map(p => ({ p, days: getLifeInDays(p.life, p.unit) }));
        withDays.sort((a, b) => currentSortOrder === 'asc' ? a.days - b.days : b.days - a.days);
        _filteredCache = withDays.map(x => x.p);
    } else {
        _filteredCache.sort((a,b) => {
            let vA, vB;
            if      (mode==='expiry') { vA=a.expiry||'9999-12-31'; vB=b.expiry||'9999-12-31'; }
            else if (mode==='date')   { vA=a.date||'';   vB=b.date||''; }
            else if (mode==='recent' || mode==='pending') {
                // id 是字符串大数，必须用字符串比较(numeric 模式兼容新老 id 长度不一)
                const cmp = String(b.id||'').localeCompare(String(a.id||''), undefined, {numeric: true});
                return currentSortOrder==='asc' ? cmp : -cmp;
            }
            return currentSortOrder==='asc' ? (vA<vB?-1:vA>vB?1:0) : (vB<vA?-1:vB>vA?1:0);
        });
    }

    renderNextPage();
    if (isAnalysisOpen) updateChart();
}

function renderNextPage() {
    const list = document.getElementById('allProductList');
    const ts  = getLocalDateStr(), wt = getExpiry(ts, config.warnDays, 'days'), tMs = parseDateMs(ts);
    const end = Math.min(_renderedCount + PAGE_SIZE, _filteredCache.length);
    // 复用 renderAllList 里预构建的分类映射表。防御性兜底:若缓存丢失则即时重建
    const catMap = _catMapCache || new Map(getAllCategories().map(c => [c.value, c.label]));

    const oldBtn = document.getElementById('loadMoreBtn');
    if (oldBtn) oldBtn.remove();

    // 【优化】分页追加也用 DocumentFragment,PAGE_SIZE=30 条也能省下 30 次 reflow
    const frag = document.createDocumentFragment();
    for (let i = _renderedCount; i < end; i++) {
        frag.appendChild(createProductCard(_filteredCache[i], ts, wt, tMs, catMap));
    }
    list.appendChild(frag);
    _renderedCount = end;

    if (_renderedCount < _filteredCache.length) {
        const btn = document.createElement('div');
        btn.id = 'loadMoreBtn';
        btn.style.cssText = 'text-align:center;padding:14px;color:var(--primary);font-size:14px;cursor:pointer;font-weight:600;background:#f0f9f0;border-radius:8px;margin:8px 0;';
        btn.textContent = `加载更多（已显示 ${_renderedCount}/${_filteredCache.length}）`;
        btn.onclick = renderNextPage;
        list.appendChild(btn);
    }
}

// JSON.stringify 的 replacer:过滤掉临时字段(以 _ 开头的,如 _search)
// 存盘时不落临时字段,备份/导出文件也会保持干净
function _stripTempFields(key, value) {
    if (typeof key === 'string' && key.startsWith('_')) return undefined;
    return value;
}

function syncData(withBackup = true) {
    const saved = safeLSSet(sk('foodProducts'), JSON.stringify(products, _stripTempFields));
