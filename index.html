// Excel 导入
// ================================================================
let pendingImportRows = [];

function parseExcelDate(v) {
    if (v == null || v === '') return '';
    // Excel 的数字日期序列号(从 1900-01-01 起)
    if (typeof v === 'number') {
        const d = new Date(Math.round((v - 25569) * 86400 * 1000));
        return isNaN(d.getTime()) ? '' : getLocalDateStr(d);
    }
    const s = String(v).replace(/\//g, '-').replace(/\./g, '-').trim();
    // 【严格校验】只接受 YYYY-M-D / YYYY-MM-DD 格式,避免 new Date('2024') 得到 2024-01-01、
    // new Date('3') 在部分浏览器得到 2001-03-01 这类松散解析产生的假日期
    const m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (!m) return '';
    const y = parseInt(m[1]), mo = parseInt(m[2]), dy = parseInt(m[3]);
    if (mo < 1 || mo > 12 || dy < 1 || dy > 31) return '';
    // 用 Date 回验一次,排除 2024-02-30 这种月日越界
    const d = new Date(y, mo - 1, dy);
    if (d.getFullYear() !== y || d.getMonth() !== mo - 1 || d.getDate() !== dy) return '';
    return getLocalDateStr(d);
}

function triggerImport() { document.getElementById('fileInput').click(); }

function handleImport(e) {
    if (!checkXLSX()) return;
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(evt) {
        try {
            const wb   = XLSX.read(new Uint8Array(evt.target.result), { type:'array' });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header:1 });
            if (rows.length < 2) return showToast('⚠️ 文件内容为空');

            pendingImportRows = [];
            rows.forEach((cols, idx) => {
                if (idx === 0 || !cols[0]) return;
                const name    = String(cols[0]).trim();
                const cat     = String(cols[1] != null ? cols[1] : '其他').trim();
                const loc     = String(cols[2] != null ? cols[2] : '常温').trim();
                const date    = parseExcelDate(cols[3]);          
                const lifeRaw = cols[4] != null ? String(cols[4]).trim() : '';
                const life    = parseInt(lifeRaw);
                const unitStr = String(cols[5] != null ? cols[5] : '天').trim();
                let unit = 'days';
                if (unitStr.includes('月')) unit = 'months';
                else if (unitStr.includes('年')) unit = 'years';
                const qty = cols[7] != null ? (parseInt(String(cols[7]).trim()) || 1) : 1;

                const valid = !!(name && date && !isNaN(life) && life > 0);
                const isDup = products.some(p => p.name === name && p.date === date);
                pendingImportRows.push({
                    id: genId(),
                    name, category: cat, location: loc, date, life, unit, qty,
                    expiry: valid ? getExpiry(date, life, unit) : '',
                    valid, isDup
                });
            });
            openImportModal();
        } catch(err) { showToast('❌ 解析失败，请检查文件格式'); console.error(err); }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = '';
}

function openImportModal() {
    const validRows = pendingImportRows.filter(r => r.valid);
    const dupRows   = validRows.filter(r => r.isDup);
    const badRows   = pendingImportRows.filter(r => !r.valid);
    const summary   = document.getElementById('importSummary');
    summary.innerHTML = `
        发现 <span class="count-ok">${validRows.length}</span> 条有效记录
        ${dupRows.length  ? `，其中 <span class="count-dup">${dupRows.length}</span> 条与库中重复` : ''}
        ${badRows.length  ? `，<span class="count-bad">${badRows.length}</span> 条格式错误（将跳过）</span>` : ''}
    `;
    const tbody = document.getElementById('importPreviewBody');
    tbody.innerHTML = '';
    pendingImportRows.slice(0, 10).forEach(r => {
        const tr = document.createElement('tr');
        if (!r.valid) tr.className = 'bad-row';
        else if (r.isDup) tr.className = 'dup-row';
        tr.innerHTML = `
            <td>${!r.valid ? '⛔ 错误' : r.isDup ? '⚠️ 重复' : '✅ 新增'}</td>
            <td>${escapeHtml(r.name)}</td>
            <td>${escapeHtml(r.category)}</td>
            <td>${r.valid ? escapeHtml(r.expiry) : '—'}</td>`;
        tbody.appendChild(tr);
    });
    if (pendingImportRows.length > 10) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td colspan="4" style="color:#aaa;font-style:italic;">… 还有 ${pendingImportRows.length - 10} 条未展示</td>`;
        tbody.appendChild(tr);
    }
    selectImportMode('merge');
    document.getElementById('importModal').classList.add('active');
    toggleMenu();
}

function selectImportMode(mode) {
    ['merge','overwrite'].forEach(m => {
        document.getElementById(`modeLabel-${m}`).classList.toggle('selected', m === mode);
        document.querySelector(`input[value="${m}"]`).checked = m === mode;
    });
}

function closeImportModal() {
    document.getElementById('importModal').classList.remove('active');
    pendingImportRows = [];
}

function confirmImport() {
    const mode = document.querySelector('input[name="importMode"]:checked').value;
    const validRows = pendingImportRows.filter(r => r.valid);
    if (!validRows.length) { showToast('⚠️ 没有可导入的有效记录'); return; }

    if (mode === 'overwrite') {
        showConfirmModal(
            '⚠️ 覆盖导入确认',
            `即将清空本店 ${products.length} 条现有记录，替换为文件中的 ${validRows.length} 条。此操作不可撤销！`,
            () => {
                products = validRows.map(r => ({ id: r.id, name: r.name, category: r.category, location: r.location, date: r.date, life: r.life, unit: r.unit, expiry: r.expiry, qty: r.qty||1 }));
                syncData();
                closeImportModal();
                showToast(`✅ 覆盖导入完成，共 ${products.length} 条`, 3000);
                switchTab('list');
            },
            `确认覆盖（清空原有 ${products.length} 条）`
        );
    } else {
        let count = 0;
        validRows.forEach(r => {
            if (!r.isDup) {
                products.push({ id: r.id, name: r.name, category: r.category, location: r.location, date: r.date, life: r.life, unit: r.unit, expiry: r.expiry, qty: r.qty||1 });
                count++;
            }
        });
        syncData();
        closeImportModal();
        const skipped = validRows.length - count;
        let msg = `✅ 合并导入完成，新增 ${count} 条`;
        if (skipped) msg += `，跳过重复 ${skipped} 条`;
        showToast(msg, 3500);
        switchTab('list');
    }
}

// ================================================================
// XLSX 可用性检查
// ================================================================
let _xlsxCheckAttempts = 0;
function checkXLSX() {
    if (typeof XLSX !== 'undefined') { _xlsxCheckAttempts = 0; return true; }
    _xlsxCheckAttempts++;
    if (_xlsxCheckAttempts >= 2) {
        showToast('❌ 表格库加载失败，请检查网络后刷新页面', 5000);
    } else {
        showToast('⏳ 表格库加载中，请稍后重试…', 3000);
    }
    return false;
}

function downloadJson(obj, filename) {
    // 用 _stripTempFields 剥离下划线前缀字段,导出文件保持干净(不含 _search 等运行期缓存)
    const blob = new Blob([JSON.stringify(obj, _stripTempFields, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);
}

// ================================================================
// 元数据包导出（JSON，仅含商品基础配置，故意剥离日期，作为填报模板使用）
// ================================================================
//
// 【两种导出文件的职责区分 — 不可混淆】
//
//   ① 元数据包（本函数）—— "商品配置模板"
//      只含固定属性：名称 / 保质期时长 / 单位 / 分类 / 存放位置 / 库存数量
//      故意剥除 date（生产日期）和 expiry（到期日期）。
//      用途：将商品列表分发给其他门店或新设备，店员导入后按
//            实际收货日期手动填写生产日期，系统自动推算到期日。
//
//   ② 门店产品信息 Excel（exportToExcel）—— "完整数据台账"
//      含所有字段，包括具体的生产日期和到期日期。
//      用途：本店存档、手工查阅或数据备份。
//
// 【实现说明】
//   Array.map() 创建新数组，逐条浅拷贝产品对象后，
//   用 date: '' / expiry: '' 覆盖日期字段。
//   不影响内存中正在显示的真实台账数据，只有导出文件里的日期是空的。
//   店员端导入后，系统会将这些条目标记为"待填写"状态并在首页提示补录。
//
// ================================================================
function exportJsonMetadata() {
    try {
        const storeName = getActiveStore().name;

        // 创建无日期的模板数组（不修改原始 products 数组）
        const templateProducts = products.map(p => ({
            ...p,         // 复制固定属性：id / name / category / location / life / unit / qty
            date:   '',   // ⬅ 剥离生产日期（店员收货时按实际日期自行填写）
            expiry: ''    // ⬅ 剥离到期日期（填完生产日期后由系统自动推算）
        }));

        downloadJson({
            _type:      'food-tool-metadata',
            version:    APP_VERSION,
            exportTime: Date.now(),
            storeName,
            storeId:    activeStoreId,
            products:   templateProducts, // ← 无日期的模板数据，非完整台账
            config,
            customCategories
        }, `元数据包_${storeName}_${fileTs()}.json`);

        showToast('✅ 元数据包（商品配置模板，不含日期）已导出');
    } catch(e) {
        showToast('❌ 导出失败：' + e.message, 4000);
        console.error('exportJsonMetadata:', e);
    }
}

function exportToExcel() {
    if (!checkXLSX()) return;
    if (!products.length) return showToast('⚠️ 库中没有记录可以导出');
    try {
        const storeName = getActiveStore().name;
        const now    = new Date();
        const nowStr = `${getLocalDateStr(now)} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

        const dataSheet = [['产品名称','条形码','分类','存放位置','生产日期','保质期时长','保质期单位','过期日期','库存数量']];
        products.forEach(p => {
            const u = p.unit === 'days' ? '天' : p.unit === 'months' ? '个月' : '年';
            dataSheet.push([p.name, p.barcode||'', p.category||'其他', p.location||'常温', p.date||'', p.life, u, p.expiry, p.qty||1]);
        });

        const noteSheet = [
            ['字段说明',''],
            ['产品名称',  '必填'],
            ['条形码',    '可选，EAN-13 等条码号'],
            ['分类',      '如：饮品、零食，可自定义'],
            ['存放位置',  '常温 / 冷藏 / 冷冻'],
            ['生产日期',  '格式：YYYY-MM-DD，导入时必填'],
            ['保质期时长','数字，如：180'],
            ['保质期单位','天 / 个月 / 年'],
            ['过期日期',  '自动计算，导入时可留空'],
            ['库存数量',  '默认 1'],
            ['',''],
            ['导出信息',''],
            ['门店名称', storeName],
            ['导出时间', nowStr],
            ['记录条数', products.length],
            ['工具版本', APP_VERSION],
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dataSheet), '产品台账');
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(noteSheet),  '字段说明');
        XLSX.writeFile(wb, `门店产品信息_${storeName}_${fileTs()}.xlsx`);
        showToast('✅ 产品台账已导出');
    } catch(e) {
        showToast('❌ 导出失败：' + e.message, 4000);
        console.error('exportToExcel:', e);
    }
}

function triggerJsonImport() { document.getElementById('jsonImportInput').click(); }

// ================================================================
// JSON 导入（元数据包 / 备份文件）
// ================================================================
// ================================================================
// 【合并 vs 覆盖 的判断逻辑 — 元数据包专用】
//
// 核心前提：元数据包是"商品模板"，产品 id 与本店原始数据相同（从本店导出的）。
// 因此不能用 id 判断重复，否则所有条目都会被跳过。
//
// 正确的去重维度：产品【名称】——同名产品是否已有"待填写"条目。
//
//   合并导入：
//     - 若本店已存在某名称的"待填写"（无日期）条目 → 跳过，不重复创建。
//     - 若该名称在本店无"待填写"条目（不管有没有已填日期的记录）→ 追加新条目。
//     - 已填日期的记录永远保留，不受影响。
//     - 所有新追加的条目分配全新 id，不复用文件里的 id。
//
//   覆盖导入（待填写区域）：
//     - 保留本店所有已填写生产日期的记录（真实数据，不能丢）。
//     - 删除本店现有的所有"待填写"条目。
//     - 将文件里的全部产品以新 id 追加为新的"待填写"条目。
//     ⚠️ "覆盖"的范围仅限待填写区域，不会动已填日期的记录。
// ================================================================
function handleJsonImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(evt) {
        try {
            const data = JSON.parse(evt.target.result);
            if (!Array.isArray(data.products)) throw new Error('格式错误：缺少 products 字段');

            // 1. 解析并校验文件中的产品列表，统一剥离日期（元数据包应已无日期，双保险）
            const validProducts = data.products.filter(p =>
                p && typeof p === 'object' && p.name && (p.id || p.id === 0)
            ).map(p => ({
                id:       genId(),             // ← 始终分配新 id，避免与本店现有 id 冲突
                name:     String(p.name),
                category: p.category || '其他',
                location: p.location || '常温',
                date:     p.date || '',        // 元数据包本身无日期，这里留空
                life:     parseInt(p.life) || 0,
                unit:     ['days','months','years'].includes(p.unit) ? p.unit : 'days',
                expiry:   p.expiry || '',      // 元数据包本身无到期日，这里留空
                qty:      Math.max(1, parseInt(p.qty) || 1)
            }));
            const badCount = data.products.length - validProducts.length;

            // 2. 计算合并数量
            //    去重维度：名称。只要本店已有该名称的"待填写"条目，就跳过。
            const pendingNames = new Set(
                products.filter(p => !p.date).map(p => p.name)
            );
            const toAdd    = validProducts.filter(p => !pendingNames.has(p.name));
            const skipCount = validProducts.length - toAdd.length; // 因已有待填写而跳过的数量

            // 3. 计算覆盖数量（保留已填日期，替换待填写区域）
            const datedProducts   = products.filter(p => p.date);  // 已填日期，覆盖时保留
            const existingPending = products.filter(p => !p.date); // 现有待填写，覆盖时清除

            const typeName  = data._type === 'food-tool-metadata' ? '元数据包' : '备份文件';
            const fromStore = data.storeName || '未知门店';
            const timeStr   = fmtDatetime(data.exportTime);

            // 4. 显示弹窗，将计算好的数量和回调传入
            showJsonImportModal({
                typeName, fromStore, timeStr,
                totalValid:    validProducts.length,
                toAddCount:    toAdd.length,
                skipCount,
                datedCount:    datedProducts.length,
                overwritePendingCount: existingPending.length,
                badCount,
                onMerge: () => {
                    // 追加：只加本店无"待填写"同名条目的产品
                    products = [...products, ...toAdd];
                    applyJsonImportConfig(data);
                    syncData();
                    renderCategorySelect('其他'); renderCategoryManager();
                    let msg = `✅ 合并完成：新增 ${toAdd.length} 条待填写`;
                    if (skipCount > 0) msg += `，已有待填写跳过 ${skipCount} 条`;
                    if (badCount  > 0) msg += `，过滤异常 ${badCount} 条`;
                    showToast(msg, 3500);
                    switchTab('list');
                },
                onOverwrite: () => {
                    // 保留已填日期的记录，清除旧的待填写，写入文件的全部产品作为新待填写
                    products = [...datedProducts, ...validProducts];
                    applyJsonImportConfig(data);
                    syncData();
                    renderCategorySelect('其他'); renderCategoryManager();
                    let msg = `✅ 待填写区域已重置：${validProducts.length} 条`;
                    if (datedProducts.length > 0) msg += `，保留已填 ${datedProducts.length} 条`;
                    if (badCount > 0) msg += `，过滤异常 ${badCount} 条`;
                    showToast(msg, 3500);
                    switchTab('list');
                }
            });
        } catch(err) {
            showToast('❌ 文件格式不正确：' + err.message);
            console.error('handleJsonImport:', err);
        }
    };
    reader.readAsText(file);
    e.target.value = '';
}

// 导入后同步 config 和自定义分类
function applyJsonImportConfig(data) {
    if (data.config) {
        config = { ...config, ...data.config };
        safeLSSet(sk('foodConfig'), JSON.stringify(config));
        syncConfigToSettingsInputs();
    }
    if (data.customCategories) { customCategories = data.customCategories; saveCategories(); }
}

// JSON 导入专用弹窗（含合并/覆盖选项）
function showJsonImportModal({ typeName, fromStore, timeStr, totalValid,
        toAddCount, skipCount, datedCount, overwritePendingCount, badCount,
        onMerge, onOverwrite }) {
    const modal = document.getElementById('jsonImportModal');
    if (!modal) return;
    document.getElementById('jiTitle').textContent = `导入${typeName}`;

    let summaryHtml = `<b>来源：</b>${escapeHtml(fromStore)}，导出于 ${escapeHtml(timeStr)}<br>`;
    summaryHtml += `<b>文件有效条数：</b>${totalValid} 条`;
    if (badCount > 0) summaryHtml += `，<span style="color:#999">过滤异常 ${badCount} 条</span>`;
    summaryHtml += '<br>';

    // 合并说明
    summaryHtml += `<br><b style="color:#1565c0">合并时：</b>`;
    summaryHtml += `新增 ${toAddCount} 条待填写`;
    if (skipCount > 0)
        summaryHtml += `，<span style="color:#888">跳过 ${skipCount} 条（已有同名待填写）</span>`;
    summaryHtml += '<br>';

    // 覆盖说明
    summaryHtml += `<b style="color:#b71c1c">覆盖时：</b>`;
    summaryHtml += `重置待填写为文件内容（${totalValid} 条）`;
    if (overwritePendingCount > 0)
        summaryHtml += `，<span style="color:#e65100">清除现有待填写 ${overwritePendingCount} 条</span>`;
    if (datedCount > 0)
        summaryHtml += `，<span style="color:#2e7d32">保留已填日期 ${datedCount} 条</span>`;

    document.getElementById('jiSummary').innerHTML = summaryHtml;
    selectJsonImportMode('merge');

    document.getElementById('jiConfirmBtn').onclick = () => {
        const mode = document.querySelector('input[name="jiMode"]:checked').value;
        closeJsonImportModal();
        if (mode === 'merge') onMerge(); else onOverwrite();
    };
    modal.classList.add('active');
}
function selectJsonImportMode(mode) {
    document.querySelector(`input[name="jiMode"][value="${mode}"]`).checked = true;
    ['merge','overwrite'].forEach(m => {
        document.getElementById(`jiLabel-${m}`).classList.toggle('selected', m === mode);
    });
}
function closeJsonImportModal() {
    document.getElementById('jsonImportModal').classList.remove('active');
}

function clearAllData() {
    const name = getActiveStore().name;
    showConfirmModal(
        `⚠️ 清空「${name}」所有记录`,
        `将永久删除该门店全部 ${products.length} 条产品数据。门店本身保留，此操作不可撤销！`,
        () => { products = []; syncData(); toggleMenu(); showToast('已清空本店所有记录'); },
        `确认清空 ${products.length} 条`
    );
}

// ================================================================
// 条形码扫描模块  (V8.1 升级：国内 API + 条形码字段)
// ================================================================

/* ---------- API 配置 ---------- */
// 支持平台：juhe(聚合数据) | shujubao(数据宝) | alicloud(阿里云市场) | custom(自定义) | none
let _apiConfig = { platform: 'none', appKey: '', appSecret: '', customUrl: '' };

const API_PLATFORM_INFO = {
    none:      { name: '暂不使用',   tip: '扫码后仅填入条形码号，不查询商品名。', needSecret: false, needUrl: false },
    juhe:      { name: '聚合数据',   tip: '注册地址：juhe.cn → 条形码查询（每日 50 次免费）', needSecret: false, needUrl: false },
    shujubao:  { name: '数据宝',     tip: '注册地址：shujubaobei.com（每日 100 次免费）', needSecret: false, needUrl: false },
    alicloud:  { name: '阿里云市场', tip: '在阿里云 API 市场购买/领取"商品条形码"服务，填入 AppCode（即 AppKey 框）即可。', needSecret: false, needUrl: false },
    custom:    { name: '自定义',     tip: 'URL 中用 {key} 代表 AppKey，{code} 代表条码。接口需返回 JSON，工具自动匹配常见字段。', needSecret: false, needUrl: true  },
};

function loadApiConfig() {
    try {
        const s = localStorage.getItem('barcodeApiConfig');
        if (s) _apiConfig = { ..._apiConfig, ...JSON.parse(s) };
    } catch(e) {}
}
function saveApiSettings() {
    _apiConfig.platform  = document.getElementById('apiPlatform').value;
    _apiConfig.appKey    = document.getElementById('apiAppKey').value.trim();
    _apiConfig.appSecret = document.getElementById('apiAppSecret').value.trim();
    _apiConfig.customUrl = document.getElementById('apiCustomUrl').value.trim();
    localStorage.setItem('barcodeApiConfig', JSON.stringify(_apiConfig));
    updateApiStatusBadge();
    showToast('✅ API 设置已保存');
    toggleMenu();
}
function onApiPlatformChange() {
    const p   = document.getElementById('apiPlatform').value;
    const info = API_PLATFORM_INFO[p] || API_PLATFORM_INFO.none;
    document.getElementById('apiAppSecret').style.display = info.needSecret ? '' : 'none';
    document.getElementById('apiCustomUrl').style.display = info.needUrl    ? '' : 'none';
    document.getElementById('apiKeyRow').style.display    = p === 'none'    ? 'none' : '';
    document.getElementById('apiCorsTip').textContent     = info.tip;
}
function updateApiStatusBadge() {
    const badge = document.getElementById('apiStatusBadge');
    if (!badge) return;
    const p = _apiConfig.platform;
    if (p === 'none' || !_apiConfig.appKey) {
        badge.className = 'api-status-badge warn';
        badge.textContent = p === 'none' ? '未启用' : '缺少 Key';
    } else {
        badge.className = 'api-status-badge ok';
        badge.textContent = (API_PLATFORM_INFO[p]||{}).name || p;
    }
}
function initApiSettingsUI() {
    loadApiConfig();
    const sel = document.getElementById('apiPlatform');
    if (sel) sel.value = _apiConfig.platform;
    const keyEl = document.getElementById('apiAppKey');
    if (keyEl) keyEl.value = _apiConfig.appKey;
    const secEl = document.getElementById('apiAppSecret');
    if (secEl) secEl.value = _apiConfig.appSecret;
    const urlEl = document.getElementById('apiCustomUrl');
    if (urlEl) urlEl.value = _apiConfig.customUrl;
    onApiPlatformChange();
    updateApiStatusBadge();
}

/* ---------- 状态变量 ---------- */
let _scannerStream = null;
let _zxingReader   = null;
let _nativeTimer   = null;
let _scannerOpen   = false;

/* ---------- ZXing 懒加载 ---------- */
let _zxingPromise = null;
function _loadZXing() {
    if (window.ZXing) return Promise.resolve();
    if (_zxingPromise) return _zxingPromise;
    _zxingPromise = new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js';
        s.onload  = resolve;
        s.onerror = () => reject(new Error('ZXing CDN 加载失败，请检查网络'));
        document.head.appendChild(s);
    });
    return _zxingPromise;
}

/* ---------- 打开扫描器 ---------- */
async function openScanner() {
    if (_scannerOpen) return;
    _scannerOpen = true;
    document.getElementById('scannerModal').classList.add('active');
    _setScannerStatus('scanning', '正在启动摄像头…');

    const constraints = { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } };
    try {
        _scannerStream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch(e) {
        try { _scannerStream = await navigator.mediaDevices.getUserMedia({ video: true }); }
        catch(e2) {
            const msg = e2.name === 'NotAllowedError' ? '请允许访问摄像头权限后重试'
                      : e2.name === 'NotFoundError'   ? '未检测到摄像头设备'
                      : '摄像头启动失败：' + e2.message;
            _setScannerStatus('error', '❌ ' + msg);
            showToast('📷 ' + msg);
            return;
        }
    }
    const video = document.getElementById('scannerVideo');
    video.srcObject = _scannerStream;
    await video.play().catch(()=>{});

    if (typeof BarcodeDetector !== 'undefined') {
        _startNativeDetector(video);
    } else {
        _setScannerStatus('scanning', '加载扫描引擎…');
        try { await _loadZXing(); _startZXingDetector(video); }
        catch(e) { _setScannerStatus('error', '❌ ' + e.message); showToast(e.message); }
    }
}

/* ---------- 原生 BarcodeDetector ---------- */
function _startNativeDetector(video) {
    _setScannerStatus('scanning', '扫描中…');
    const detector = new BarcodeDetector({ formats: ['ean_13','ean_8','code_128','code_39','upc_a','upc_e','qr_code','data_matrix'] });
    let lastTs = 0;
    async function tick(ts) {
        if (!_scannerOpen) return;
        if (ts - lastTs > 350 && video.readyState >= 2) {
            lastTs = ts;
            try {
                const results = await detector.detect(video);
                if (results.length > 0) { _onCodeDetected(results[0].rawValue); return; }
            } catch(e) {}
        }
        _nativeTimer = requestAnimationFrame(tick);
    }
    _nativeTimer = requestAnimationFrame(tick);
}

/* ---------- ZXing 降级 ---------- */
function _startZXingDetector(video) {
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.UPC_A,    ZXing.BarcodeFormat.UPC_E,
        ZXing.BarcodeFormat.QR_CODE,
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    _zxingReader = new ZXing.BrowserMultiFormatReader(hints, { delayBetweenScanAttempts: 400 });
    _setScannerStatus('scanning', '扫描中…');
    _zxingReader.decodeFromStream(_scannerStream, video, (result, err) => {
        if (!_scannerOpen) return;
        if (result) _onCodeDetected(result.getText());
    });
}

/* ---------- 关闭扫描器 ---------- */
function closeScanner() {
    _scannerOpen = false;
    if (_nativeTimer) { cancelAnimationFrame(_nativeTimer); _nativeTimer = null; }
    if (_zxingReader) { try { _zxingReader.reset(); } catch(e){} _zxingReader = null; }
    if (_scannerStream) { _scannerStream.getTracks().forEach(t => t.stop()); _scannerStream = null; }
    const video = document.getElementById('scannerVideo');
    if (video) video.srcObject = null;
    document.getElementById('scannerModal').classList.remove('active');
}

/* ---------- 识别成功回调 ---------- */
async function _onCodeDetected(code) {
    if (!_scannerOpen) return;
    closeScanner();
    showToast('✅ 已扫描：' + code, 2000);

    // 条形码字段直接填入
    const barcodeInput = document.getElementById('prodBarcode');
    if (barcodeInput) barcodeInput.value = code;

    const nameInput = document.getElementById('prodName');
    nameInput.scrollIntoView({ behavior: 'smooth', block: 'center' });

    // 如果未配置 API，直接结束
    if (_apiConfig.platform === 'none' || !_apiConfig.appKey) {
        showToast('条码已填入，请手动输入商品名', 2500);
        nameInput.focus();
        return;
    }

    nameInput.placeholder = '查询商品名称…';
    try {
        const info = await _lookupBarcode(code);
        if (info && info.name) {
            nameInput.value = info.name;
            showToast('📦 已填入：' + info.name);
            nameInput.dispatchEvent(new Event('input', { bubbles: true }));
        } else {
            showToast('未查到商品名，请手动填写', 3000);
        }
    } catch(e) {
        showToast('查询失败，请手动填写商品名', 3000);
        console.warn('barcode lookup error:', e);
    }
    nameInput.placeholder = '产品名称 (如: 鲜奶)';
    nameInput.focus();
}

/* ---------- 国内条码查询（纯国内接口，无需 VPN）----------ー
   注意：浏览器直接调用第三方 API 受 CORS 限制。
   在 Capacitor APP 环境中没有此限制，可正常使用。
   浏览器端如遇 CORS 报错，属平台限制，需 APP 版本才能完整使用。
---------------------------------------------------------------*/
async function _lookupBarcode(code) {
    const { platform, appKey, appSecret, customUrl } = _apiConfig;
    let url = '', headers = {}, parseResult = null;

    if (platform === 'juhe') {
        // 聚合数据 条形码查询 API
        // 文档: https://www.juhe.cn/docs/api/id/47
        url = `https://www.juheapi.com/barcode/index?key=${encodeURIComponent(appKey)}&barcode=${encodeURIComponent(code)}`;
        parseResult = data => {
            if (data.error_code !== 0 || !data.result) return null;
            const r = data.result;
            const name = (r.goodsName || '').trim();
            const brand = (r.brandName || '').trim();
            if (!name) return null;
            return { name: (brand && !name.startsWith(brand)) ? brand + ' ' + name : name };
        };

    } else if (platform === 'shujubao') {
        // 数据宝 条形码查询 API
        // 文档: https://www.shujubaobei.com
        url = `https://api.shujubaobei.com/2.0/barcode?app_key=${encodeURIComponent(appKey)}&code=${encodeURIComponent(code)}`;
        parseResult = data => {
            if (!data || data.code !== 200) return null;
            const r = data.data || {};
            const name = (r.goodsName || r.goods_name || r.name || '').trim();
            if (!name) return null;
            return { name };
        };

    } else if (platform === 'alicloud') {
        // 阿里云市场 商品条形码查询（APPCODE 鉴权方式）
        // 多数阿里云市场商品条码服务使用此格式，具体路径以购买的服务文档为准
        url = `https://barcode.market.alicloudapi.com/barcode?code=${encodeURIComponent(code)}`;
        headers = { 'Authorization': `APPCODE ${appKey}` };
        parseResult = data => {
            // 阿里云市场各服务商返回格式不同，尝试常见字段
            const r = data.result || data.data || data;
            const name = (r.goodsName || r.goods_name || r.name || r.product_name || '').trim();
            if (!name) return null;
            return { name };
        };

    } else if (platform === 'custom') {
        if (!customUrl) return null;
        url = customUrl.replace('{key}', encodeURIComponent(appKey)).replace('{code}', encodeURIComponent(code));
        parseResult = data => {
            // 自动匹配常见商品名字段
            const r = data.result || data.data || data;
            const name = (r.goodsName || r.goods_name || r.name || r.product_name ||
                          r.goodName  || r.good_name  || r.title || '').trim();
            if (!name) return null;
            return { name };
        };
    } else {
        return null;
    }

    const ctrl  = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 7000);
    try {
        const r = await fetch(url, { signal: ctrl.signal, headers });
        clearTimeout(timer);
        if (!r.ok) return null;
        const data = await r.json();
        return parseResult(data);
    } catch(e) {
        clearTimeout(timer);
        if (e.name === 'AbortError') return null;
        // CORS 错误提示
        if (e.message && e.message.includes('Failed to fetch')) {
            showToast('⚠️ API 请求被浏览器拦截（CORS），APP 版本可正常使用', 4000);
        }
        return null;
    }
}

/* ---------- 工具函数 ---------- */
function _setScannerStatus(type, text) {
    const el = document.getElementById('scannerStatus');
    if (!el) return;
    el.className = 'scanner-ft-text ' + type;
    el.textContent = text;
}
